services:
  gamehostpanel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamehostpanel
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Panel__DockerEndpoint: unix:///var/run/docker.sock
      Panel__DataRoot: /app/data
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
